components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    SourceSystemHeader:
      name: X-Source-System
      in: header
      required: true
      schema:
        type: string
    ActorRoleHeader:
      name: X-Actor-Role
      in: header
      required: false
      schema:
        type: string
    ActorIdHeader:
      name: X-Actor-Id
      in: header
      required: false
      schema:
        type: string
    TraceparentHeader:
      name: traceparent
      in: header
      required: false
      schema:
        type: string

  responses:
    ValidationFailed:
      description: Validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Entity not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    DuplicateIdempotencyKey:
      description: Duplicate idempotency key with conflicting payload
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InvalidReversal:
      description: Reversal is invalid
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: Business rule rejection
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    RateLimitExceeded:
      description: Too many requests for protected posting endpoints
      headers:
        Retry-After:
          schema:
            type: integer
          description: Retry window in seconds
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    Problem:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    JournalLineRequest:
      type: object
      required: [accountCode, amountCents, isCredit]
      properties:
        accountCode:
          type: string
        amountCents:
          type: integer
          format: int64
        isCredit:
          type: boolean
        dimensions:
          type: object
          additionalProperties:
            type: string

    CreateJournalEntryRequest:
      type: object
      required: [eventId, postedDate, transactionCurrency, createdBy, lines]
      properties:
        eventId:
          type: string
        postedDate:
          type: string
          format: date
        effectiveDate:
          type: string
          format: date
          nullable: true
        transactionDate:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        referenceId:
          type: string
          nullable: true
        transactionCurrency:
          type: string
        createdBy:
          type: string
        autoReverse:
          type: boolean
          default: false
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLineRequest'

    CreateJournalEntryBatchRequest:
      type: object
      required: [batchMode, entries]
      properties:
        batchMode:
          $ref: '#/components/schemas/JournalBatchMode'
