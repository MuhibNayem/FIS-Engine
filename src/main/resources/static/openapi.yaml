openapi: 3.0.3
info:
  title: FIS Process API
  version: v1
  description: Complete REST API contract for the FIS ledger service.
servers:
  - url: /v1
security:
  - bearerAuth: []
paths:
  /events:
    post:
      summary: Ingest financial event
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/SourceSystemHeader'
        - $ref: '#/components/parameters/TraceparentHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinancialEventRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventIngestionResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '409':
          $ref: '#/components/responses/DuplicateIdempotencyKey'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /journal-entries:
    post:
      summary: Create manual journal entry
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorRoleHeader'
        - $ref: '#/components/parameters/TraceparentHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJournalEntryRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

    get:
      summary: List journal entries
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: postedDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: postedDateTo
          in: query
          schema:
            type: string
            format: date
        - name: accountCode
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PENDING_APPROVAL, POSTED, REVERSAL, CORRECTION, REJECTED]
        - name: referenceId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Journal entries page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryPage'

  /journal-entries/batch:
    post:
      summary: Create manual journal entries in batch
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorRoleHeader'
        - $ref: '#/components/parameters/TraceparentHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJournalEntryBatchRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryBatchResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '409':
          $ref: '#/components/responses/DuplicateIdempotencyKey'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /journal-entries/{id}:
    get:
      summary: Get journal entry by id
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Journal entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /journal-entries/{id}/reverse:
    post:
      summary: Reverse posted journal entry
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReversalRequest'
      responses:
        '201':
          description: Reversal posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReversalResponse'
        '409':
          $ref: '#/components/responses/InvalidReversal'

  /journal-entries/{id}/correct:
    post:
      summary: Correct posted journal entry (reverse + replacement)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectionRequest'
      responses:
        '201':
          description: Correction completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReversalResponse'
        '409':
          $ref: '#/components/responses/InvalidReversal'

  /journal-entries/{id}/submit:
    post:
      summary: Submit draft journal entry for approval
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitWorkflowRequest'
      responses:
        '200':
          description: Workflow submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalWorkflowActionResponse'

  /journal-entries/{id}/approve:
    post:
      summary: Approve pending workflow journal entry
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorRoleHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveWorkflowRequest'
      responses:
        '201':
          description: Workflow approved and posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalWorkflowActionResponse'

  /journal-entries/{id}/reject:
    post:
      summary: Reject pending workflow journal entry
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectWorkflowRequest'
      responses:
        '200':
          description: Workflow rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalWorkflowActionResponse'

  /accounts:
    post:
      summary: Create account
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
    get:
      summary: List accounts
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: accountType
          in: query
          schema:
            type: string
            enum: [ASSET, LIABILITY, EQUITY, REVENUE, EXPENSE]
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Account page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPage'

  /accounts/{accountCode}:
    get:
      summary: Get account by code
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: accountCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update account
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - name: accountCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'

  /accounts/{accountCode}/aggregated-balance:
    get:
      summary: Get account aggregated balance (self + descendants)
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: accountCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account with aggregated balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /accounting-periods:
    post:
      summary: Create accounting period
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountingPeriodRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountingPeriodResponse'
    get:
      summary: List accounting periods
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, SOFT_CLOSED, HARD_CLOSED]
      responses:
        '200':
          description: Accounting period list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountingPeriodResponse'

  /accounting-periods/{periodId}/status:
    patch:
      summary: Change accounting period status
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - name: periodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeriodStatusChangeRequest'
      responses:
        '200':
          description: Updated period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountingPeriodResponse'

  /exchange-rates:
    post:
      summary: Upload exchange rates
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeRateUploadRequest'
      responses:
        '201':
          description: Uploaded rates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExchangeRateResponse'
    get:
      summary: Query exchange rates
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: sourceCurrency
          in: query
          required: true
          schema:
            type: string
        - name: targetCurrency
          in: query
          required: true
          schema:
            type: string
        - name: effectiveDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Matching rates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExchangeRateResponse'

  /mapping-rules:
    post:
      summary: Create mapping rule
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMappingRuleRequest'
      responses:
        '201':
          description: Created mapping rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MappingRuleResponse'
    get:
      summary: List mapping rules
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Mapping rule page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MappingRulePage'

  /mapping-rules/{id}:
    put:
      summary: Update mapping rule
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMappingRuleRequest'
      responses:
        '200':
          description: Updated mapping rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MappingRuleResponse'
    delete:
      summary: Deactivate mapping rule
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deactivated

  /revaluations/periods/{periodId}:
    post:
      summary: Run period-end revaluation
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: periodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRevaluationRequest'
      responses:
        '201':
          description: Revaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevaluationResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /revaluations/periods/{periodId}/translation:
    post:
      summary: Run functional-currency translation (CTA/OCI) for income statement items
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: periodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunTranslationRequest'
      responses:
        '201':
          description: Translation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslationResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /settlements:
    post:
      summary: Record FX settlement and post realized gain/loss adjustment
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementRequest'
      responses:
        '201':
          description: Settlement processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementResponse'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'

  /admin/integrity-check:
    get:
      summary: Verify accounting equation integrity for a tenant
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Integrity check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerIntegrityCheckResponse'

  /admin/year-end-close:
    post:
      summary: Perform fiscal year-end close
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YearEndCloseRequest'
      responses:
        '200':
          description: Year-end close result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YearEndCloseResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /reports/trial-balance:
    get:
      summary: Generate trial balance report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: asOfDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Trial balance report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrialBalanceReport'

  /reports/balance-sheet:
    get:
      summary: Generate balance sheet report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: asOfDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Balance sheet report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceSheetReport'

  /reports/income-statement:
    get:
      summary: Generate income statement report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: fromDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Income statement report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncomeStatementReport'

  /reports/general-ledger/{accountCode}:
    get:
      summary: Generate general ledger detail report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: accountCode
          in: path
          required: true
          schema:
            type: string
        - name: fromDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: General ledger report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneralLedgerReport'

  /reports/cash-flow:
    get:
      summary: Generate cash flow report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: fromDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Cash flow report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CashFlowReport'

  /reports/account-activity/{accountCode}:
    get:
      summary: Generate account activity report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: accountCode
          in: path
          required: true
          schema:
            type: string
        - name: fromDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Account activity report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountActivityReport'

  /reports/journal-register:
    get:
      summary: Generate journal register report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: fromDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Journal register report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalRegisterReport'

  /reports/dimension-summary:
    get:
      summary: Generate dimension summary report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: dimensionKey
          in: query
          required: true
          schema:
            type: string
        - name: fromDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Dimension summary report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DimensionSummaryReport'

  /reports/fx-exposure:
    get:
      summary: Generate FX exposure report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: asOfDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: FX exposure report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FxExposureReport'

  /reports/aging:
    get:
      summary: Generate aging analysis report
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: accountType
          in: query
          required: true
          schema:
            type: string
            enum: [ASSET, LIABILITY]
        - name: asOfDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Aging report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgingReport'

  # ==================== AR INVOICES ====================
  /ar/invoices:
    post:
      summary: Create AR invoice
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
    get:
      summary: List AR invoices
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object

  /ar/invoices/{invoiceId}:
    get:
      summary: Get AR invoice by ID
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /ar/invoices/{invoiceId}/finalize:
    post:
      summary: Finalize AR invoice
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'

  /ar/invoices/{invoiceId}/void:
    post:
      summary: Void AR invoice
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'

  /ar/invoices/{invoiceId}/lines:
    get:
      summary: Get AR invoice lines
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
