groups:
  - name: fis-engine.alerts
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          / sum(rate(http_server_requests_seconds_count[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected on FIS-Engine"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: OutboxBacklogHigh
        expr: fis_outbox_unpublished_backlog > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Outbox backlog is building up"
          description: "Outbox backlog is {{ $value }} messages"

      - alert: OutboxDLQCritical
        expr: fis_outbox_dlq_size > 100
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Dead Letter Queue has critical number of messages"
          description: "DLQ size is {{ $value }} - immediate attention required"

      - alert: DatabaseConnectionPoolExhausted
        expr: |
          (hikaricp_connections_active{pool=~"FisPool-.*"} +
           hikaricp_connections_pending{pool=~"FisPool-.*"})
          / hikaricp_connections_max{pool=~"FisPool-.*"} > 0.9
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near capacity"
          description: "Connection pool utilization is {{ $value | humanizePercentage }}"

      - alert: RedisConnectionFailed
        expr: redis_connected_clients == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis connection lost"
          description: "No active Redis connections detected"

      - alert: RabbitMQConsumerLag
        expr: |
          sum(rabbitmq_queue_messages{queue=~"fis.journal.*"}) by (queue)
          > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ consumer lag detected"
          description: "Queue {{ $labels.queue }} has {{ $value }} messages waiting"

      - alert: HighJournalWriteLatency
        expr: |
          histogram_quantile(0.95,
            rate(fis_journal_write_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High journal write latency"
          description: "p95 write latency is {{ $value }}s"

      - alert: RateLimitTriggered
        expr: increase(fis_rate_limit_exceeded_total[5m]) > 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Rate limiting triggered frequently"
          description: "{{ $value }} requests were rate limited in the last 5 minutes"

      - alert: CircuitBreakerOpen
        expr: |
          resilience4j_circuitbreaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker opened"
          description: "Circuit breaker {{ $labels.name }} is OPEN - failing fast"

      - alert: InstanceDown
        expr: |
          up{job="fis-engine"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "FIS-Engine instance is down"
          description: "Instance {{ $labels.instance }} is not responding"

      # ===== Batch Processing Alerts =====
      - alert: BatchSizeTooSmall
        expr: fis_batch_last_size < 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Batch size is too small"
          description: "Batch size {{ $value }} indicates coalescing may not be working properly"

      - alert: BatchErrorRate
        expr: rate(fis_batch_error_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Batch processing error rate is high"
          description: "Batch error rate is {{ $value | humanizePercentage }}"

      - alert: BatchDurationHigh
        expr: |
          histogram_quantile(0.95,
            rate(fis_batch_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Batch processing duration is high"
          description: "p95 batch duration is {{ $value }}s"

      # ===== Worker Alerts =====
      - alert: WorkerQueueDepthHigh
        expr: fis_worker_queue_depth > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Worker queue depth is high"
          description: "Queue depth {{ $value }} may indicate backpressure issues"

      - alert: WorkerQueueRejected
        expr: rate(fis_worker_batch_rejected_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Worker is rejecting batches"
          description: "{{ $value }} batches rejected in last 5 minutes due to overload"

      - alert: WorkerPoolExhausted
        expr: |
          fis_worker_active_count / fis_worker_pool_size > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Worker pool near capacity"
          description: "Worker utilization is {{ $value | humanizePercentage }}"

      # ===== Shard Routing Alerts =====
      - alert: ShardRoutingFailure
        expr: rate(fis_shard_routing_errors_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Shard routing errors detected"
          description: "{{ $value }} routing errors in last 5 minutes"

      - alert: ShardImbalance
        expr: |
          (fis_worker_queue_depth{shard="SHARD_1"} - fis_worker_queue_depth{shard="SHARD_2"})
          / (fis_worker_queue_depth{shard="SHARD_1"} + fis_worker_queue_depth{shard="SHARD_2"}) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Shard distribution imbalance detected"
          description: "Shard distribution is uneven across workers"

      # ===== Circuit Breaker Alerts =====
      - alert: JournalWorkerCircuitBreakerOpen
        expr: |
          resilience4j_circuitbreaker_state{name="journalWriteWorker",state="open"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Journal write circuit breaker is OPEN"
          description: "Database writes are being rejected - check database connectivity"

      # ===== Database Health =====
      - alert: CitusWorkerDown
        expr: |
          citus_get_active_worker_nodes() == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "No Citus workers available"
          description: "All Citus workers are unavailable"

      - alert: DistributedTransactionTimeout
        expr: |
          rate(citus_multi_shard_commit_latency_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Distributed transaction timeouts detected"
          description: "{{ $value }} distributed transaction timeouts per second"