upstream fis_backend {
    least_conn;

    # App Server 1
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;

    # App Server 2 (uncomment when running multiple instances)
    # server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;

    # App Server 3 (uncomment when running multiple instances)
    # server 127.0.0.1:8082 max_fails=3 fail_timeout=30s;

    keepalive 64;
}

proxy_cache_path /var/cache/nginx/fis levels=1:2 keys_zone=fis_cache:10m max_size=100m inactive=60m use_temp_path=off;

limit_req_zone $binary_remote_addr zone=fis_write_limit:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=fis_read_limit:10m rate=120r/s;
limit_req_zone $tenant_id zone=fis_tenant_write:10m rate=100r/s;

map $http_x_tenant_id $tenant_id {
    default $http_x_tenant_id;
    "" $remote_addr;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;
    client_body_timeout 30s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location / {
        proxy_pass http://fis_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
    }

    location /v1/journal-entries {
        limit_req zone=fis_write_limit burst=20 nodelay;

        proxy_pass http://fis_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_http_version 1.1;
    }

    location /v1/async/journal-entries {
        limit_req zone=fis_write_limit burst=50 nodelay;

        proxy_pass http://fis_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_http_version 1.1;

        proxy_request_buffering off;
    }

    location /v1/events {
        limit_req zone=fis_write_limit burst=20 nodelay;

        proxy_pass http://fis_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_http_version 1.1;
    }

    location /v1/reports/ {
        limit_req zone=fis_read_limit burst=50 nodelay;

        proxy_pass http://fis_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_http_version 1.1;
    }

    location /actuator/health {
        proxy_pass http://fis_backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;

        access_log off;
    }

    location /actuator {
        proxy_pass http://fis_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /swagger-ui {
        proxy_pass http://fis_backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    location /openapi.yaml {
        proxy_pass http://fis_backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;

        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}