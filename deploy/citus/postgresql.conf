# Citus Coordinator Configuration

# Connection Settings
listen_addresses = '*'
max_connections = 200
superuser_reserved_connections = 5

# Memory Settings
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 32MB
maintenance_work_mem = 256MB

# Write Ahead Log
wal_level = replica
max_wal_size = 2GB
min_wal_size = 1GB
wal_buffers = 64MB

# Replication
wal_keep_size = 1GB
max_wal_senders = 10
max_replication_slots = 10

# Query Planning
random_page_cost = 1.1
effective_io_concurrency = 200

# Logging
log_destination = 'stderr'
logging_collector = off
log_connections = on
log_disconnections = on
log_duration = off
log_line_prefix = '%t [%p] %q%u@%d '

# Citus Settings
shared_preload_libraries = 'citus'
citus.shard_count = 32
citus.shard_replication_factor = 1
citus.max_shared_pool_size = 200
citus.connection_pool_size = 200

# Force snapshot isolation for distributed transactions
citus.multi_shard_commit_protocol = '2pc'