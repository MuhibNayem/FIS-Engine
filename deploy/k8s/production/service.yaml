apiVersion: v1
kind: Service
metadata:
  name: fis-process
  namespace: fis-production
  labels:
    app: fis-process
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app: fis-process
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  sessionAffinity: None
---
# Headless service for direct pod access (useful for debugging)
apiVersion: v1
kind: Service
metadata:
  name: fis-process-headless
  namespace: fis-production
  labels:
    app: fis-process
    environment: production
spec:
  clusterIP: None
  selector:
    app: fis-process
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  publishNotReadyAddresses: false
