apiVersion: v1
kind: ConfigMap
metadata:
  name: fis-process-config
  namespace: fis-production
  labels:
    app: fis-process
    environment: production
data:
  # --- Database ---
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-primary:5432/fis"
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.PostgreSQLDialect"
  SPRING_FLYWAY_ENABLED: "true"
  SPRING_FLYWAY_LOCATIONS: "classpath:db/migration"

  # --- Connection Pool (HikariCP) ---
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "30"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "10"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "600000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1800000"

  # --- Redis ---
  SPRING_DATA_REDIS_HOST: "redis-primary"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_DATA_REDIS_SSL_ENABLED: "true"
  SPRING_DATA_REDIS_TIMEOUT: "5000"
  SPRING_DATA_REDIS_LETTUCE_POOL_MAX_ACTIVE: "20"
  SPRING_DATA_REDIS_LETTUCE_POOL_MAX_IDLE: "10"
  SPRING_DATA_REDIS_LETTUCE_POOL_MIN_IDLE: "5"

  # --- RabbitMQ ---
  SPRING_RABBITMQ_HOST: "rabbitmq-0.rabbitmq.fis-production.svc.cluster.local"
  SPRING_RABBITMQ_PORT: "5672"
  SPRING_RABBITMQ_SSL_ENABLED: "true"
  SPRING_RABBITMQ_CONNECTION_TIMEOUT: "10000"
  SPRING_RABBITMQ_REQUESTED_HEART_BEAT: "60"

  # --- Server ---
  SERVER_PORT: "8080"
  SERVER_SHUTDOWN: "graceful"
  SERVER_TOMCAT_THREADS_MAX: "200"
  SERVER_TOMCAT_THREADS_MIN_SPARE: "20"
  SERVER_TOMCAT_MAX_CONNECTIONS: "10000"
  SERVER_TOMCAT_ACCEPT_COUNT: "100"
  SERVER_COMPRESSION_ENABLED: "true"
  SERVER_COMPRESSION_MIME_TYPES: "application/json,application/xml,text/html,text/plain"
  SERVER_COMPRESSION_MIN_RESPONSE_SIZE: "1024"

  # --- Security ---
  FIS_SECURITY_ENABLED: "true"
  FIS_POSTING_RATE_LIMIT: "1000"
  FIS_SECURITY_DEVMODE_BYPASS: "false"

  # --- Actuator ---
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE: "health,info,prometheus,metrics,env,loggers"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
  MANAGEMENT_SERVER_PORT: "8080"

  # --- Resilience4j ---
  RESILIENCE4J_CIRCUITBREAKER_INSTANCES_DEFAULT_SLIDING_WINDOW_SIZE: "100"
  RESILIENCE4J_CIRCUITBREAKER_INSTANCES_DEFAULT_FAILURE_RATE_THRESHOLD: "50"
  RESILIENCE4J_CIRCUITBREAKER_INSTANCES_DEFAULT_WAIT_DURATION_IN_OPEN_STATE: "10000"
  RESILIENCE4J_CIRCUITBREAKER_INSTANCES_DEFAULT_PERMITTED_NUMBER_OF_CALLS_IN_HALF_OPEN_STATE: "10"

  # --- OpenTelemetry ---
  OTEL_SERVICE_NAME: "fis-process"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"
