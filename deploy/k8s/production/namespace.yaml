apiVersion: v1
kind: Namespace
metadata:
  name: fis-production
  labels:
    name: fis-production
    environment: production
    cost-center: engineering
    owner: fis-platform-team
    app.kubernetes.io/part-of: fis-engine
---
# Resource Quotas for the namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: fis-production-quota
  namespace: fis-production
spec:
  hard:
    requests.cpu: "40"
    requests.memory: 64Gi
    limits.cpu: "80"
    limits.memory: 128Gi
    persistentvolumeclaims: "20"
    pods: "100"
    services: "20"
    configmaps: "20"
    secrets: "20"
---
# Limit Range defaults
apiVersion: v1
kind: LimitRange
metadata:
  name: fis-production-limits
  namespace: fis-production
spec:
  limits:
    - default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: "250m"
        memory: 256Mi
      type: Container
