apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fis-process-ingress
  namespace: fis-production
  labels:
    app: fis-process
    environment: production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503 http_504"
    nginx.ingress.kubernetes.io/proxy-next-upstream-tries: "2"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-rpm: "2000"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'none'";
    nginx.ingress.kubernetes.io/whitelist-source-range: "${INGRESS_WHITELIST_CIDR:-0.0.0.0/0}"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "${FIS_DOMAIN:-fis-engine.example.com}"
      secretName: fis-process-tls-secret
  rules:
    - host: "${FIS_DOMAIN:-fis-engine.example.com}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fis-process
                port:
                  name: http
          # Separate path for actuator endpoints (restricted access)
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: fis-process
                port:
                  name: http
