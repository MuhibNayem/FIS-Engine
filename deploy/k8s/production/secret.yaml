# NOTE: This is a TEMPLATE Secret manifest.
# DO NOT commit actual secret values to version control.
# Use a secrets manager (Vault, AWS Secrets Manager, Sealed Secrets, External Secrets)
# to populate real values.
#
# Apply with sealed secrets:
#   kubectl apply -f deploy/k8s/production/secret.yaml
#
# Or use External Secrets Operator with a SecretStore.
apiVersion: v1
kind: Secret
metadata:
  name: fis-process-secret
  namespace: fis-production
  labels:
    app: fis-process
    environment: production
type: Opaque
stringData:
  # --- Database credentials ---
  SPRING_DATASOURCE_USERNAME: "<DB_USERNAME>"
  SPRING_DATASOURCE_PASSWORD: "<DB_PASSWORD>"

  # --- Redis credentials ---
  SPRING_DATA_REDIS_PASSWORD: "<REDIS_PASSWORD>"

  # --- RabbitMQ credentials ---
  SPRING_RABBITMQ_USERNAME: "<RABBITMQ_USERNAME>"
  SPRING_RABBITMQ_PASSWORD: "<RABBITMQ_PASSWORD>"

  # --- OAuth2 / JWT ---
  FIS_JWT_PUBLIC_KEY_PEM: |
    -----BEGIN PUBLIC KEY-----
    <PUBLIC_KEY_HERE>
    -----END PUBLIC KEY-----

  # --- TLS (if terminating in-app) ---
  SERVER_SSL_KEY_STORE_PASSWORD: "<KEYSTORE_PASSWORD>"

  # --- Encryption key for sensitive data at rest ---
  FIS_ENCRYPTION_KEY: "<AES_256_KEY_BASE64>"
