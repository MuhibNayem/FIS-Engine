global
    log stdout local0
    log-tag fis-engine
    maxconn 4096
    user root
    group root
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3
    timeout connect 5000
    timeout server 30000
    timeout client 30000
    timeout http-request 30s
    timeout http-keep-alive 5s
    balance leastconn

listen fis-app
    bind :8080
    mode http
    option httpchk GET /actuator/health
    http-check expect status 200
    server fis-1 127.0.0.1:8081 check inter 5s fall 2 rise 3
    server fis-2 127.0.0.1:8082 check inter 5s fall 2 rise 3
    server fis-3 127.0.0.1:8083 check inter 5s fall 2 rise 3

listen postgres-primary
    bind :5432
    mode tcp
    option tcp-check
    tcp-check connect
    server pg-primary 127.0.0.1:5432 check inter 5s fall 2 rise 3

listen postgres-replica
    bind :5433
    mode tcp
    option source
    option tcp-check
    server pg-replica 127.0.0.1:5434 check inter 5s fall 2 rise 3

listen redis
    bind :6380
    mode tcp
    option tcp-check
    tcp-check connect
    server redis-1 127.0.0.1:6380 check inter 5s fall 2 rise 3

stats enable
stats uri /haproxy-stats
stats refresh 10s